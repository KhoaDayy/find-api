name: Build Windows Hook

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/hook/**"
      - "src/dllmain.cpp"
      - "src/injector.cpp"
      - "src/lua_signature_probe_main.cpp"
      - "src/pattern_scan.h"
      - "lib/minhook/**"
      - "Scripts/face_share_logger.lua"
      - "hook_config.example.json"
      - "hook_config.json"
      - "CMakeLists.txt"
      - "build.bat"
      - ".github/workflows/build-hook.yml"

permissions:
  contents: write

jobs:
  build-hook:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate MSVC and build x64
        shell: cmd
        run: |
          setlocal EnableExtensions
          set "VSWHERE=%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe"
          if not exist "%VSWHERE%" (
            echo vswhere.exe not found
            exit /b 1
          )

          for /f "usebackq delims=" %%i in (`"%VSWHERE%" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL (
            echo MSVC x64 toolchain not found
            exit /b 1
          )

          echo Visual Studio: %VSINSTALL%
          set "VCVARS=%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          if not exist "%VCVARS%" set "VCVARS=%VSINSTALL%\VC\Auxiliary\Build\vcvarsall.bat"
          if not exist "%VCVARS%" (
            echo vcvars not found
            exit /b 1
          )

          echo Using: %VCVARS%
          if /I "%VCVARS:~-13%"=="vcvarsall.bat" (
            call "%VCVARS%" x64
          ) else (
            call "%VCVARS%"
          )
          if errorlevel 1 exit /b 1

          if not exist "lib\minhook\include\MinHook.h" (
            echo Missing vendored MinHook headers
            exit /b 1
          )
          if not exist "lib\minhook\src\hook.c" (
            echo Missing vendored MinHook sources
            exit /b 1
          )

          call build.bat
          if errorlevel 1 exit /b 1

      - name: Package release zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = "build/bin"
          if (-not (Test-Path $bin)) { throw "Missing build/bin" }

          if (Test-Path "hook_config.example.json") {
            Copy-Item "hook_config.example.json" (Join-Path $bin "hook_config.example.json") -Force
            if (-not (Test-Path (Join-Path $bin "hook_config.json"))) {
              Copy-Item "hook_config.example.json" (Join-Path $bin "hook_config.json") -Force
            }
          }

          $cap = Join-Path $bin "captures"
          if (-not (Test-Path $cap)) { New-Item -ItemType Directory -Path $cap | Out-Null }

          $dll = Get-ChildItem $bin -Recurse -Filter "GameHook.dll" | Select-Object -First 1
          $injector = Get-ChildItem $bin -Recurse -Filter "Injector.exe" | Select-Object -First 1
          $probe = Get-ChildItem $bin -Recurse -Filter "LuaSignatureProbe.exe" | Select-Object -First 1
          $lua = Get-ChildItem $bin -Recurse -Filter "face_share_logger.lua" | Select-Object -First 1
          if (-not $dll) { throw "GameHook.dll not found" }
          if (-not $injector) { throw "Injector.exe not found" }
          if (-not $probe) { throw "LuaSignatureProbe.exe not found" }
          if (-not $lua) { throw "face_share_logger.lua not found" }

          Write-Host "DLL: $($dll.FullName) — $($dll.Length) bytes"
          Write-Host "Injector: $($injector.FullName) — $($injector.Length) bytes"
          Write-Host "Probe: $($probe.FullName) — $($probe.Length) bytes"
          Write-Host "Lua: $($lua.FullName) — $($lua.Length) bytes"
          Get-ChildItem $bin -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          $zipName = "wwm-face-share-hook-$env:GITHUB_SHA.zip"
          $zipPath = Join-Path "dist" $zipName
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $bin '*') -DestinationPath $zipPath -Force
          Write-Host "Packaged $zipPath ($((Get-Item $zipPath).Length) bytes)"
          "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload hook artifact
        uses: actions/upload-artifact@v4
        with:
          name: wwm-face-share-hook-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            build/bin/**
            dist/*.zip

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $sha = $env:GITHUB_SHA
          $short = $sha.Substring(0, 7)
          $tag = "hook-$short"
          $zip = $env:ZIP_PATH
          if (-not (Test-Path $zip)) { throw "Release zip missing: $zip" }

          $title = "Face Share Hook $short"
          $notes = @"
          **Passive face FilePicker share capture** (x64 Windows) — Lua-first

          - Commit: ``$sha``
          - Contents: ``GameHook.dll``, ``Injector.exe``, ``LuaSignatureProbe.exe``, ``Scripts/face_share_logger.lua``, ``hook_config.json``
          - Capture only — no live upload / token replay
          - If lua_load signature missing: F5 is ignored; see ``captures/lua_signature_probe.json``

          ## Usage
          1. Unzip next to each other
          2. Start game (``wwm.exe`` / ``yysls.exe``)
          3. Run ``Injector.exe --pid <pid>`` as Administrator
          4. Check ``hook_boot.log`` — F5 only if Lua hook installed
          5. In-game: Face Share once
          6. Parse: ``node Scripts/parse_filepicker_capture.js captures/face_share_capture.jsonl``
          7. Offline probe: ``LuaSignatureProbe.exe --module path\to\wwm.exe``

          See ``docs/HOOK_FACE_SHARE_CAPTURE.md``.
          "@

          # Replace release if tag already exists (re-run / amend)
          $existing = gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Deleting existing release $tag"
            gh release delete $tag --yes --cleanup-tag
          }

          gh release create $tag $zip `
            --title $title `
            --notes $notes `
            --latest=false

          Write-Host "Created release $tag"
